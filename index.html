<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Daily Journal</title>
  <link rel="stylesheet" href="styles/style.css">
</head>

<body>

<div class="container">
  <h1>Mi diario ✏️</h1>

  <!-- ================= ENTRADA ================= -->
  <textarea id="entry" placeholder="Hoy ha sido un día..."></textarea>
  <button class="btn-save" id="btnSave">Guardar</button>

  <!-- ================= ENTRADAS ================= -->
  <h2>Entradas</h2>
  <div id="entriesList"></div>

  <!-- ================= AUTH ================= -->
  <div id="auth">
    <button id="btnGoogle">Login con Google</button>
    <button id="btnEmail">Login con Email</button>
    <button id="btnLogout">Logout</button>
  </div>

  <!-- ================= AJUSTES PERFIL ================= -->
  <div id="settingsPanel" style="display:none; margin-top:30px;">
    <h2>⚙️ Ajustes de perfil</h2>

    <input id="nameInput" placeholder="Tu nombre" />

    <button id="btnSaveProfile">Guardar cambios</button>

    <p id="profileStatus"></p>
  </div>

</div>

<script type="module" src="./script.js"></script>

</body>
</html>
